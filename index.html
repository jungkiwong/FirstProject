<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비서의 운동 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .checked-item { text-decoration: line-through; opacity: 0.6; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <!-- 로그인 섹션 -->
    <div id="login-container" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-100 rounded-full mb-4">
                    <i class="fas fa-running text-blue-600 text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">비서의 운동 관리</h1>
                <p class="text-slate-500 mt-2">사용자님, 오늘도 힘차게 시작해볼까요?</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">아이디</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="ID를 입력하세요">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">비밀번호</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Password를 입력하세요">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors shadow-lg shadow-blue-200">
                    로그인
                </button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden">잘못된 정보입니다. 다시 확인해주세요.</p>
            </div>
        </div>
    </div>

    <!-- 메인 대시보드 (로그인 후 표시) -->
    <div id="app-container" class="hidden">
        <!-- 헤더 -->
        <header class="bg-white border-b border-slate-200 sticky top-0 z-20 px-4 py-4">
            <div class="max-w-3xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <i class="fas fa-fire text-blue-600 text-xl"></i>
                    <h1 class="text-lg font-bold">비서의 운동 관리</h1>
                </div>
                <button onclick="handleLogout()" class="text-sm text-slate-400 hover:text-red-500 flex items-center gap-1 transition-colors">
                    <i class="fas fa-sign-out-alt"></i> 로그아웃
                </button>
            </div>
        </header>

        <main class="max-w-3xl mx-auto p-4 md:p-6 space-y-6">
            <!-- 요약 카드 -->
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-6 text-white shadow-xl shadow-blue-100">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-xl font-bold mb-1" id="greeting-text">환영합니다, 사용자님!</h2>
                        <p class="text-blue-100 text-sm" id="today-date-display"></p>
                    </div>
                    <i class="fas fa-trophy text-3xl text-white/30"></i>
                </div>
                <div class="mt-6 bg-white/10 rounded-xl p-4 flex justify-around">
                    <div class="text-center">
                        <p class="text-xs text-blue-100 mb-1">오늘 진행</p>
                        <p class="text-xl font-bold" id="today-progress">0 / 4</p>
                    </div>
                    <div class="border-l border-white/20"></div>
                    <div class="text-center">
                        <p class="text-xs text-blue-100 mb-1">상태</p>
                        <p class="text-xl font-bold" id="today-status">준비</p>
                    </div>
                </div>
            </div>

            <!-- 탭 전환 -->
            <div class="flex bg-slate-200 p-1 rounded-xl">
                <button onclick="switchTab('today')" id="tab-today" class="flex-1 py-2 rounded-lg font-medium bg-white text-blue-600 shadow-sm transition-all">오늘의 운동</button>
                <button onclick="switchTab('month')" id="tab-month" class="flex-1 py-2 rounded-lg font-medium text-slate-600 hover:text-slate-900 transition-all">월간 히스토리</button>
            </div>

            <!-- 오늘의 운동 섹션 -->
            <section id="section-today" class="space-y-4">
                <div id="workout-list" class="space-y-3">
                    <!-- 운동 항목들 JS에서 생성 -->
                </div>
            </section>

            <!-- 월간 히스토리 섹션 -->
            <section id="section-month" class="hidden space-y-4">
                <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="font-bold text-lg" id="calendar-title">2023년 10월</h3>
                        <div class="flex gap-2">
                            <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500"><i class="fas fa-chevron-left"></i></button>
                            <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500"><i class="fas fa-chevron-right"></i></button>
                        </div>
                    </div>
                    <div class="calendar-grid text-center text-xs font-bold text-slate-400 mb-2">
                        <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
                    </div>
                    <div id="calendar-days" class="calendar-grid gap-1">
                        <!-- 달력 날짜들 JS에서 생성 -->
                    </div>
                </div>
                <div class="bg-blue-50 border border-blue-100 p-4 rounded-xl text-xs text-blue-700 leading-relaxed">
                    <i class="fas fa-info-circle mr-1"></i> 달력의 원은 해당 날짜에 완료한 운동의 비율을 시각적으로 나타냅니다.
                </div>
            </section>
        </main>
    </div>

    <script>
        // 초기 데이터 및 설정
        const USER_ID = 'user';
        const USER_PASS = 'userpass';
        
        const EXERCISES = [
            { id: 'pushups', name: '팔 굽혀 펴기 (50회)', emoji: '💪' },
            { id: 'stairs', name: '계단 오르기', emoji: '🏃‍♂️' },
            { id: 'running', name: '러닝 (5km)', emoji: '👟' },
            { id: 'squats', name: '스쿼트 (50회)', emoji: '🏋️‍♀️' }
        ];

        let workoutData = JSON.parse(localStorage.getItem('workoutData')) || {};
        let currentCalendarDate = new Date();
        let activeTab = 'today';

        // 로그인 핸들러
        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const error = document.getElementById('login-error');

            if (u === USER_ID && p === USER_PASS) {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                initApp();
            } else {
                error.classList.remove('hidden');
            }
        }

        function handleLogout() {
            location.reload();
        }

        function initApp() {
            updateDateDisplay();
            renderWorkouts();
            renderCalendar();
            updateProgress();
        }

        function updateDateDisplay() {
            const now = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
            document.getElementById('today-date-display').innerText = now.toLocaleDateString('ko-KR', options);
        }

        function switchTab(tab) {
            activeTab = tab;
            const btnToday = document.getElementById('tab-today');
            const btnMonth = document.getElementById('tab-month');
            const secToday = document.getElementById('section-today');
            const secMonth = document.getElementById('section-month');

            if (tab === 'today') {
                btnToday.className = "flex-1 py-2 rounded-lg font-medium bg-white text-blue-600 shadow-sm transition-all";
                btnMonth.className = "flex-1 py-2 rounded-lg font-medium text-slate-600 hover:text-slate-900 transition-all";
                secToday.classList.remove('hidden');
                secMonth.classList.add('hidden');
                renderWorkouts();
            } else {
                btnMonth.className = "flex-1 py-2 rounded-lg font-medium bg-white text-blue-600 shadow-sm transition-all";
                btnToday.className = "flex-1 py-2 rounded-lg font-medium text-slate-600 hover:text-slate-900 transition-all";
                secMonth.classList.remove('hidden');
                secToday.classList.add('hidden');
                renderCalendar();
            }
        }

        // 오늘의 운동 렌더링
        function renderWorkouts() {
            const list = document.getElementById('workout-list');
            const todayStr = getTodayString();
            const todayLogs = workoutData[todayStr] || {};
            
            list.innerHTML = '';
            EXERCISES.forEach(ex => {
                const isChecked = todayLogs[ex.id] || false;
                const item = document.createElement('div');
                item.className = `flex items-center justify-between p-5 bg-white border-2 rounded-2xl cursor-pointer transition-all ${isChecked ? 'border-blue-100 bg-blue-50/30' : 'border-transparent hover:border-slate-200 shadow-sm'}`;
                item.onclick = () => toggleWorkout(ex.id);
                
                item.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-2xl">${ex.emoji}</span>
                        <span class="font-semibold ${isChecked ? 'checked-item text-slate-400' : 'text-slate-700'}">${ex.name}</span>
                    </div>
                    <div class="w-7 h-7 rounded-full border-2 flex items-center justify-center transition-colors ${isChecked ? 'bg-blue-600 border-blue-600' : 'border-slate-200'}">
                        ${isChecked ? '<i class="fas fa-check text-white text-sm"></i>' : ''}
                    </div>
                `;
                list.appendChild(item);
            });
            updateProgress();
        }

        function toggleWorkout(id) {
            const todayStr = getTodayString();
            if (!workoutData[todayStr]) workoutData[todayStr] = {};
            
            workoutData[todayStr][id] = !workoutData[todayStr][id];
            localStorage.setItem('workoutData', JSON.stringify(workoutData));
            renderWorkouts();
        }

        function updateProgress() {
            const todayStr = getTodayString();
            const todayLogs = workoutData[todayStr] || {};
            const completedCount = Object.values(todayLogs).filter(v => v).length;
            
            document.getElementById('today-progress').innerText = `${completedCount} / ${EXERCISES.length}`;
            
            const statusEl = document.getElementById('today-status');
            if (completedCount === 0) statusEl.innerText = "준비";
            else if (completedCount === EXERCISES.length) statusEl.innerText = "완료!";
            else statusEl.innerText = "진행중";
        }

        // 달력 렌더링
        function renderCalendar() {
            const container = document.getElementById('calendar-days');
            const title = document.getElementById('calendar-title');
            
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            
            title.innerText = `${year}년 ${month + 1}월`;
            container.innerHTML = '';

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const todayStr = getTodayString();

            // 빈 칸 (이전 달 날짜)
            for (let i = 0; i < firstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'h-14';
                container.appendChild(empty);
            }

            // 날짜 생성
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayLogs = workoutData[dateStr] || {};
                const completedCount = Object.values(dayLogs).filter(v => v).length;
                const isToday = dateStr === todayStr;

                const dayEl = document.createElement('div');
                dayEl.className = `h-14 border rounded-xl flex flex-col items-center justify-between py-2 transition-all ${isToday ? 'border-blue-500 bg-blue-50/50 shadow-inner' : 'border-slate-50 hover:bg-slate-50'}`;
                
                // 완수도 시각화 (진척도에 따른 도넛 바 느낌)
                const completionRate = (completedCount / EXERCISES.length) * 100;
                
                dayEl.innerHTML = `
                    <span class="text-[10px] font-bold ${isToday ? 'text-blue-600' : 'text-slate-400'}">${day}</span>
                    <div class="relative w-6 h-6 flex items-center justify-center">
                        <svg class="w-full h-full -rotate-90">
                            <circle cx="12" cy="12" r="9" stroke="#E2E8F0" stroke-width="2" fill="none" />
                            <circle cx="12" cy="12" r="9" stroke="${completedCount === 4 ? '#2563EB' : '#93C5FD'}" stroke-width="2" fill="none" 
                                stroke-dasharray="56.5" stroke-dashoffset="${56.5 - (56.5 * completionRate / 100)}" style="transition: stroke-dashoffset 0.5s ease" />
                        </svg>
                        <span class="absolute text-[8px] font-bold text-slate-700">${completedCount}</span>
                    </div>
                `;
                container.appendChild(dayEl);
            }
        }

        function changeMonth(offset) {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + offset);
            renderCalendar();
        }

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

    </script>
</body>
</html>
